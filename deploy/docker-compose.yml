# Docker Compose — опциональный вариант развёртывания (этап 2).
# Запуск из корня репозитория:
#   cp deploy/.env.production.example .env
#   docker compose -f deploy/docker-compose.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-auditor}
      POSTGRES_USER: ${DB_USER:-auditor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - auditor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-auditor} -d ${DB_NAME:-auditor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - auditor_inbox:/app/server/data/inbox
    expose:
      - "3001"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/auditor-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  auditor_pgdata:
  auditor_inbox:
