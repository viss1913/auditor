# Reverse proxy для «ИИ-Аудитор» (production)
# Скопировать: /etc/nginx/sites-available/auditor.conf
# ln -s .../auditor.conf /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

upstream auditor_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name auditor.example.corp;

    ssl_certificate     /etc/ssl/certs/auditor.crt;
    ssl_certificate_key /etc/ssl/private/auditor.key;

    client_max_body_size 150m;

    root /opt/auditor/dist;
    index index.html;

    # SPA — все неизвестные пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Martin API
    location /api/ {
        proxy_pass http://auditor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 60s;
    }

    # Legacy OPIF routes (без префикса /api)
    location ~ ^/(ping|upload|trades|audit)(/|$) {
        proxy_pass http://auditor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}

# Редirect HTTP → HTTPS (опционально)
server {
    listen 80;
    server_name auditor.example.corp;
    return 301 https://$host$request_uri;
}
